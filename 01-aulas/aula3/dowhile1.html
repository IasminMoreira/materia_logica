<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Do-While</title>
</head>
<body>
    
    <h1>Testando Do-While</h1>

    <script>

        let n = 1

        do {
            document.write("Iasmin<br>")
            n++
        } while (n<=100)

    </script>

</body>
</html>
