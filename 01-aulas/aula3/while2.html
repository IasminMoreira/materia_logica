<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando While</title>
</head>
<body>
    
    <h1>Testando While</h1>

    <script>
        let n = 1

        while (n<=100) {
            document.write(n + "<br>")
            n+=2
        }
    </script>
</body>
</html>
