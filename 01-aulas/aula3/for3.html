<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números de 1 a 100(apenas os pares)</title>
</head>
<body>
    
    <h1>Números de 1 a 100(apenas os pares)</h1>

    <script>
        for (let i = 1; i <= 100; i+=2) {
            document.write(i + "<br>");
        }
    </script>
</body>
</html>
