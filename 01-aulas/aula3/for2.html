<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repetir a frase 10 vezes</title>
</head>
<body>
    
    <h1>Repetir a frase 10 vezes</h1>

    <script>
        let frase = "A professora Débora não é saudosa, pois ela ainda não morreu!";

        for (let i = 0; i <= 100; i++) {
            document.write(frase + "<br>");
        }

        
    </script>

</body>
</html>
