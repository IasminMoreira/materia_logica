<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comando For</title>
</head>
<body>
    
    <h1>Testando comando For</h1>

    <script>
        let tabuada = parseInt(prompt("Digite a tabuada que desejada: "));

        for (let i = 1; i <= 20; i++) {
            document.write(tabuada + " x " + i + " = " + (tabuada * i) + "<br>");
        }

    </script>

</body>
</html>
