<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido do McDonalds</title>
</head>
<body>
    
    <h1>Faça o Seu Pedido</h1>

    <script>
        let Pedido = parseInt(prompt("Digite o número do seu pedido Big Mac(1) McChicken(2) Combo Super Mário(3) 2 Sanduíches(4) Cheddar Mc Melt(5):"))
        let Combo

        switch(Pedido){
            case 1: Combo = "Mc Oferta Big Mac<br> a partir de R$39,90"
            break
            case 2: Combo = "Mc Oferta McChicken<br> a partir de R$37,00"
            break
            case 3: Combo = "Mc Combo Super Mário Galaxy O Filme + Sobremesa<br> a partir de R$63,00"
            break
            case 4: Combo = "Combo dos Clássicos - 2 Sanduíches + Batata + Bebida<br> a partir de R$48,90"
            break
            case 5: Combo = "Mc Oferta Duplo Cheddar Mc Melt<br> a partir de R$52,90"
            break
            default: Combo = "Combo inexistente!"
        }

        document.write(Combo)

    </script>

</body>
</html>
