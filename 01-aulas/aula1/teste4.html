<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando cálculos usando o JavaScript</title>
</head>
<body>

    <h1>
        Testando cálculos usando o JavaScript
    </h1>

    <script>
        let numero1 = parseFloat(prompt("entre com o primeiro número"))
        document.write("O primeiro número é: " + numero1)

        let numero2 = parseFloat(prompt("entre com o segundo número"))
        document.write("<br>O segundo número é: " + numero2)
        
        let soma = numero1 + numero2
        document.write("<br>A soma dos números é: " + soma)

        let subtracao = numero1 - numero2
        document.write("<br>A subtração dos números é: " + subtracao)

        let multiplicacao = numero1 * numero2
        document.write("<br>A multiplição dos números é: " + multiplicacao)

        let divisao = numero1 / numero2
        document.write("<br>A divisão dos números é: " + divisao)

    </script>
    
</body>
</html>
