<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comandos usando javascript</title>
</head>
<body>
    
    <h1>Testando comandos usando javascript</h1>

<script>

    let nome = "Iasmin" // variável do tipo string (letras, número e caracteres especiais)
    let idade = 20 // variável do tipo int
    let altura = 1.65 // variável float, número quebrado
    let salario = 18000.50 //variável do tipo double (valores que usam muito espaço de memória)
    let mestrado = false // variável do tipo booleana (verdadeiro ou falso)
    
    //instanciar é criar uma variável e atribuir um valor a ela

    //Concatenar junta dois objetos do programa, exemplo: variável + texto

    document.write("Meu nome é: " + nome)
    document.write(", eu tenho " + idade + " anos.")
    document.write("<br>A minha altura é: " + altura)
    document.write("<br>O meu salário é: " + "R$" + salario)
    document.write("<br>Eu tenho mestrado? " + mestrado)

    let nome_gato = "Stark"
    let idade_gato = 4
    let altura_gato = 0.76
    let salario_gato = 21600.25 //(valor de 2k de ração)= 72 * 300
    let mestrado_gato = true

    document.write("<br> <br>Nome é: " + nome_gato)
    document.write("<br>Idade é " + idade + "anos")
    document.write("<br>Altura é: " + altura)
    document.write("<br>O salário dele é: " + "R$" + salario_gato)
    document.write("<br>Ele tem mestrado? " + mestrado_gato)
</script>

</body>
</html>
