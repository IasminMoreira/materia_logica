<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando cálculos usando JS</title>
</head>
<body>
    
    <h1>Testando cálculos usando JavaScript</h1>

    <script>

        let numero1 = 20
        let numero2 = 40

        let soma = numero1 + numero2
        let media = (numero1 + numero2) / 2
        let multiplica = numero1 * numero2
        let divisao = numero1 / numero2

        document.write("A soma dos números é: " + soma)
        document.write("<br>A média dos números é: " + media)
        document.write("<br>A multiplicação dos números é: " + multiplica)
        document.write("<br>A divisão dos números é: " + divisao)
        

    </script>

</body>
</html>
