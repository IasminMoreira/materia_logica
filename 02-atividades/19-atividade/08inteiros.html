<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprimir Números Inteiros</title>
</head>
<body>
    
    <h1>Imprimir Números Inteiros de 1 até o número desejado</h1>

    <script>
        let numero = parseInt(prompt("Digite o número até o qual deseja imprimir:"))

        for (let i = 1; i <= numero; i++) {
            document.write(i + "<br>")
        }
    </script>
</body>
</html>
