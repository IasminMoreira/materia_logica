<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Números inteiros maiores que 100</title>
</head>
<body>

    <h1>10 Números inteiros maiores que 100</h1>

    <script>
        let numero = 101

        for (let i = 0; i < 10; i++) {
            document.write(numero + "<br>")
            numero++
        }
    </script>
    
</body>
</html>
