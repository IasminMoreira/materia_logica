<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva 30 a 0</title>
</head>
<body>
    
    <h1>Contagem Regressiva 30 a 0</h1>

    <script>
        for (let i = 30; i >= 0; i--) {
            alert(i)
        }
        alert("EXPLOSÃO!")

        document.write("O sistema foi destruído com sucesso!")
    </script>

</body>
</html>
