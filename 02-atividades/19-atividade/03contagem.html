<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem em ordem Decrescente</title>
</head>
<body>
    
    <h1>Contagem em ordem Decrescente (10 a 1)</h1>

    <script>
        for (let i = 10; i >= 1; i--) {
            document.write(i + "<br>")
        }
    </script>
</body>
</html>
