<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Aritmética</title>
</head>
<body>
    
    <h1>Média Aritmética de 15 até 100</h1>

    <script>
        let soma = 0
        let quantidade = 0

        for (let i = 15; i <= 100; i++) {
            soma += i
            quantidade++
        }

        let media = soma / quantidade
        document.write("A média aritmética dos números de 15 até 100 é: " + media)

    </script>
</body>
</html>
