<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Aritmética</title>
</head>
<body>
    
    <h1>Média Aritmética de 15 entre 100</h1>

    <script>
        let numero1 = 15
        let numero2 = 100

        let media = (numero1 + numero2) / 2

        document.write("A média aritmética entre " + numero1 + " e " + numero2 + " é: " + media)

    </script>
</body>
</html>
