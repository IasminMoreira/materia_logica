<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Aritmética</title>
</head>
<body>
    
    <h1>Média Aritmética</h1>

    <script>
        /*Média dos números 8, 9 e 7*/
        let media1 = (8 + 9 + 7) / 3

        /*Média dos números 4, 5 e 6*/
        let media2 = (4 + 5 + 6) / 3

        /*Soma das duas médias*/
        let somaDasMedias = media1 + media2

        /*Média das médias*/
        let mediaDasMedias = (media1 + media2) / 2

        /*Exibir os resultados*/
        document.write("Média de 8, 9 e 7: " + media1)
        document.write("<br>Média de 4, 5 e 6: " + media2)
        document.write("<br>Soma das médias: " + somaDasMedias)
        document.write("<br>Média das médias: " + mediaDasMedias)
    </script>
</body>
</html>
