<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antecessor e Sucessor</title>
</head>
<body>

    <h1>Antecessor e Sucessor</h1>

    <script>
        /*Leitura do número*/
        let numero = parseInt(prompt("Digite um número inteiro: <br>Ex: 5"))

        /*Cálculo do antecessor e sucessor*/
        let antecessor = numero - 1
        let sucessor = numero + 1

        /*Exibir os resultados*/
        document.write("Número informado: " + numero)
        document.write("<br>Antecessor: " + antecessor)
        document.write("<br>Sucessor: " + sucessor)

    </script>

</body>
</html>
