<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 números e média</title>
</head>
<body>
    
    <h1>A média dos 5 números</h1>

    <!--Ler 5 números inteiros usando while e exibir a média aritmética.-->

    <script>

    let i = 1
    let soma = 0
        
    while (i <= 5) {
        let numero = parseInt(prompt("Digite o número " + i + ":"))
        soma += numero
        i++
        document.write(numero + "<br>")
    }
    
    let media = soma / 5
    document.write("A média dos números é: " + media)

    </script>
</body>
</html>
