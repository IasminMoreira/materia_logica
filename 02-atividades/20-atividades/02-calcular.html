<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular soma de 1 a 100</title>
</head>
<body>
    
    <h1>Calcular soma de 1 a 100</h1>

    <!--Calcular a soma dos números de 1 a 100 usando while-->

    <script>

        let n = 1
        let soma = 0

        while (n<=100){
            soma += n
            n++
        }
        document.write("A soma é: " + soma)

    </script>
</body>
</html>
