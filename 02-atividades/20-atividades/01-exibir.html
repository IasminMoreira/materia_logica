<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exibir números</title>
</head>
<body>
    
    <h1>Exibir números</h1>

    <!--Exibir os números de 1 a 10 usando while-->

    <script>

        let n = 1

        while (n<=10){
            document.write(n + "<br>")
            n++
        }

    </script>
</body>
</html>
