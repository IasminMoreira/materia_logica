<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada até 10</title>
</head>
<body>
    
    <h1>Exibir a tabuada até o 10</h1>

    <!--Ler um número e exibir a tabuada dele até o décimo valor usando while.-->

    <script>

    let mult = 0
    let n = parseInt(prompt("Digite um número:"))
        
    while (mult <= 10) {
        document.write(n + " x " + mult + " = " + (n * mult) + "<br>")
        mult++
    }
    
    </script>
</body>
</html>
