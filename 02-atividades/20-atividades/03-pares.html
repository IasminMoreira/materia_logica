<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pares 1 a 50</title>
</head>
<body>
    
    <h1>Os pares de 1 a 50</h1>

    <!--Calcular a soma dos números de 1 a 100 usando while-->

    <script>

        let n = 2
        
        while (n <= 50){
            document.write(n + "<br>")
            n+= 2
        }

    </script>
</body>
</html>
