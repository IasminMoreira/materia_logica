<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esse número está entre 0 e 100?</title>
</head>
<body>
    <h1>Esse número está entre 0 e 100?</h1>

    <script>
        
        let contador = 0
        
        for (let i = 1; i <= 20; i++) {
            let numero = parseInt(prompt("Digite o número " + i + ":"))
            if (numero >= 0 && numero <= 100) {
                contador++
            }
        }

        document.write("O número de números entre 0 e 100 é: " + contador)

    </script>

</body>
</html>
