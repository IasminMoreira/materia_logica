<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A média dos números</title>
</head>
<body>
    
    <h1>A média dos números</h1>

    <script>
        let media1 = (8 + 9 + 7) / 3
        let media2 = (4 + 5 + 6) / 3
        document.write("A média dos números 8, 9 e 7 é: " + media1 + "<br>")
        document.write("A média dos números 4, 5 e 6 é: " + media2)
        let somaMedias = media1 + media2
        document.write("<br>A soma das médias é: " + somaMedias)
        let mediaGeral = somaMedias / 2
        document.write("<br>A média geral é: " + mediaGeral)
    </script>

</body>
</html>
