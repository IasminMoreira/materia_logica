<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>

    <script>
        let num1 = parseInt(prompt("Digite o primeiro número:"))
        let num2 = parseInt(prompt("Digite o segundo número:")) 
        let num3 = parseInt(prompt("Digite o terceiro número:"))
        let num4 = parseInt(prompt("Digite o quarto número:"))
        let num5 = parseInt(prompt("Digite o quinto número:"))
        let num6 = parseInt(prompt("Digite o sexto número:"))
        let num7 = parseInt(prompt("Digite o sétimo número:"))
        let num8 = parseInt(prompt("Digite o oitavo número:"))
        let num9 = parseInt(prompt("Digite o nono número:"))
        let num10 = parseInt(prompt("Digite o décimo número:"))
        let soma = num1 + num2 + num3 + num4 + num5 + num6 + num7 + num8 + num9 + num10
        document.write("Números digitados: " + num1 + ", " + num2 + ", " + num3 + ", " + num4 + ", " + num5 + ", " + num6 + ", " + num7 + ", " + num8 + ", " + num9 + ", " + num10)
        document.write("<br>A soma dos números digitados é: " + soma)
    </script>
</body>
</html>
