<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Números Divisíveis</title>
</head>
<body>
    <h1>Verificador de Números Divisíveis</h1>

    <script>
        let numero = parseInt(prompt("Digite um número:"))

        if (numero % 10 !== 0 && numero % 5 !== 0 && numero % 2 !== 0) {
        document.write("Esse número não é divisível por nenhum")
        }

        if (numero % 10 === 0) {
            document.write("<br>Esse número é divisível por 10")
        }

        if (numero % 5 === 0) {
            document.write("<br>Esse número é divisível por 5")
        }

        if (numero % 2 === 0) {
            document.write("<br>Esse número é divisível por 2")
        }

        document.write("<br>Número digitado: " + numero)
    </script>

</body>
</html>
