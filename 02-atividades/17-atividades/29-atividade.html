<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Números</title>
</head>
<body>
    
    <h1>Classificador de Números</h1>
    
    <script>
        
        let contador0_100 = 0
        let contador101_200 = 0
        let contador201_mais = 0

        for (let i = 1; i <= 20; i++) {
            let numero = parseInt(prompt("Digite o número " + i + ":"))
            if (numero >= 0 && numero <= 100) {
                contador0_100++
            } else if (numero >= 101 && numero <= 200) {
                contador101_200++
            } else {
                contador201_mais++
            }
        }

        document.write("O número de números entre 0 e 100 é: " + contador0_100)
        document.write("<br>O número de números entre 101 e 200 é: " + contador101_200)
        document.write("<br>O número de números maiores que 200 é: " + contador201_mais)

    </script>
</body>
</html>
