    <script>
        let Idades = 0;
        let contadorMaiores = 0

        for (let i = 1; i <= 20; i++) {
            let idade = parseInt(prompt("Digite a idade da pessoa " + i + ":"));
            document.write("Idade da pessoa " + i + ": " + idade + "<br>");
