<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qual é o antecessor e o sucessor?</title>
</head>
<body>
     <h1>Qual é o antecessor e o sucessor?</h1>

    <script>
        let numero = parseInt(prompt("Digite um número:"))
        document.write("O número digitado é: " + numero + "<br>")
        document.write("O antecessor do número é: " + (numero - 1) + "<br>")
        document.write("O sucessor do número é: " + (numero + 1))
    </script>
</body>
</html>
