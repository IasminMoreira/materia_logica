<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média das idades de 20 pessoas</title>
</head>
<body>

    <h1>Média das idades de 20 pessoas</h1>

    <script>
        let somaIdades = 0;

        for (let i = 1; i <= 20; i++) {
            let idade = parseInt(prompt("Digite a idade da pessoa " + i + ":"));
            document.write("Idade da pessoa " + i + ": " + idade + "<br>");
            somaIdades += idade;
            mediaIdades = somaIdades / i;
        }

        document.write("A soma das idades das 20 pessoas é: " + somaIdades);
        document.write("<br>A média das idades das 20 pessoas é: " + mediaIdades);
    </script>
    
</body>
</html>
