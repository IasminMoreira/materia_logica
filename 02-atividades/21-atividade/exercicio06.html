<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 6</title>
</head>
<body>

  <script>
    // Exercício 06 - Ordem crescente
    let numeros = []

    for (let i = 0; i < 10; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
    }

    for (let i = 0; i < 9; i++) {
      for (let j = 0; j < 9 - i; j++) {
        if (numeros[j] > numeros[j + 1]) {
          let temp = numeros[j]
          numeros[j] = numeros[j + 1]
          numeros[j + 1] = temp
        }
      }
    }

    document.write("<h2>Ordem crescente:</h2>")

    for (let i = 0; i < 10; i++) {
      document.write(numeros[i] + "<br>")
    }
    
  </script>

</body>
</html>
