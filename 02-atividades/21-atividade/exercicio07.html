<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 7</title>
</head>
<body>

  <script>
    // Exercício 07 - Quantidade de positivos
    let numeros = []
    let qtdPositivos = 0

    for (let i = 0; i < 10; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
    }

    for (let i = 0; i < 10; i++) {
      if (numeros[i] > 0) {
        qtdPositivos++
      }
    }

    document.write("<h2>Quantidade de positivos: " + qtdPositivos + "</h2>")
  </script>

</body>
</html>
