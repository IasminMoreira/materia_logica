<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 14</title>
</head>
<body>

  <script>
    // Exercício 14 - Exibir somente pares
    let numeros = []

    for (let i = 0; i < 7; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
    }

    document.write("<h2>Números pares:</h2>")

    for (let i = 0; i < 7; i++) {
      if (numeros[i] % 2 == 0) {
        document.write(numeros[i] + "<br>")
      }
    }
    
  </script>

</body>
</html>
