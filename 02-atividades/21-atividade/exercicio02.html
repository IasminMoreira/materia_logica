<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 2</title>
</head>
<body>

  <script>
    // Exercício 02 - Soma de 10 números
    let numeros = []
    let soma = 0

    for (let i = 0; i < 10; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
      soma += numeros[i]
    }

    document.write("<h2>Soma: " + soma + "</h2>")
  </script>

</body>
</html>
