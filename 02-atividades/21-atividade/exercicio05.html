<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 5</title>
</head>
<body>

  <script>
    // Exercício 05 - Maior e menor valor
    let numeros = []

    for (let i = 0; i < 5; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
    }

    let maior = numeros[0]
    let menor = numeros[0]

    for (let i = 1; i < 5; i++) {
      if (numeros[i] > maior) {
        maior = numeros[i]
      }
      if (numeros[i] < menor) {
        menor = numeros[i]
      }
    }

    document.write("<h2>Maior: " + maior + "</h2><br>Menor: " + menor)
  </script>

</body>
</html>
