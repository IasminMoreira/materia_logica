<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 16</title>
</head>
<body>

  <script>
    // Exercício 16 - Matriz 3x3
    let matriz = []

    for (let i = 0; i < 3; i++) {
      matriz[i] = []
      for (let j = 0; j < 3; j++) {
        matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`))
      }
    }

    document.write("<h2>Matriz 3x3:</h2>")

    for (let i = 0; i < 3; i++) {
      for (let j = 0; j < 3; j++) {
        document.write(matriz[i][j] + " ")
      }
      document.write("<br>")
    }
  
  </script>

</body>
</html>
