<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 21</title>
</head>
<body>

  <script>
    // Exercício 21 - Média da matriz 4x4
    let matriz = []
    let soma = 0

    for (let i = 0; i < 4; i++) {
      matriz[i] = []
      for (let j = 0; j < 4; j++) {
        matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`))
        soma += matriz[i][j]
      }
    }

    let media = soma / 16  // 4x4 = 16 elementos

    document.write("<h2>Média aritmética: " + media + "</h2>")
  </script>

</body>
</html>
