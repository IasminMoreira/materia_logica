<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailchimp</title>
    <link rel="stylesheet" href="loja.css" type="text/css">
</head>
<body>

    <main>
        <nav id="nav-sup">
            <ul id="nav-links">
                <li><a href="#">Produto</a></li>
                <li><a href="#">Recursos</a></li>
                <li><a href="#">Inspiração</a></li>
                <li><a href="#">Preços</a></li>
            </ul>

            <img src="assets/figura1.png" alt="Mailchimp logo" id="logo">

            <div id="nav-acoes">
                <button id="lupa"><img src="assets/figura4.png" alt="Buscar"></button>
                <button id="conectar">Conectar</button>
                <button id="cadastro">Cadastre-se gratuitamente</button>
            </div>
        </nav>

        <article>
            <div id="conteudo-esquerda">
                <h1>As lojas do Mailchimp já estão disponíveis</h1>
                <p>Impulsione as vendas, envolva os clientes e anuncie seu negócio em um só lugar. Crie sua loja virtual gratuitamente.</p>
                <button id="saiba">Saiba mais</button>
            </div>

            <div id="conteudo-direita">
                <div id="mediopage">
                    <nav id="nav-mockup">
                        <img src="assets/tres_pontinhos.png" alt="">
                        <img src="assets/carrinho.png" alt="">
                    </nav>
                    <p id="nome-loja">Big Mood Spa</p>
                    <img src="assets/figura2.png" alt="Produto em destaque">
                </div>

                <div id="minipage">
                    <div id="header-carrinho">
                        <p id="titulo-carrinho">Shopping Cart</p>
                    </div>
                    <img src="assets/figua3.png">
                    <button id="checkout">Continue To Checkout</button>
                </div>
            </div>
        </article>
    </main>

</body>
</html>
