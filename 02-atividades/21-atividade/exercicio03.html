<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 3</title>
</head>
<body>

  <script>
    // Exercício 03 - Média aritmética
    let numeros = []
    let soma = 0

    for (let i = 0; i < 7; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
      soma += numeros[i]
    }

    let media = soma / 7

    document.write("<h2>Média: " + media + "</h2>")
  </script>

</body>
</html>
