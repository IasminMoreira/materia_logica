<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 12</title>
</head>
<body>

  <script>
    // Exercício 12 - Ordem decrescente
    let numeros = []

    for (let i = 0; i < 5; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
    }

    for (let i = 0; i < 4; i++) {
      for (let j = 0; j < 4 - i; j++) {
        if (numeros[j] < numeros[j + 1]) {
          let temp = numeros[j]
          numeros[j] = numeros[j + 1]
            numeros[j + 1] = temp
        }
      }
    }

    document.write("<h2>Ordem decrescente:</h2>")

    for (let i = 0; i < 5; i++) {
      document.write(numeros[i] + "<br>")
    }
  </script>

</body>
</html>
