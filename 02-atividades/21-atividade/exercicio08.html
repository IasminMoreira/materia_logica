<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 8</title>
</head>
<body>

  <script>
    // Exercício 08 - Média dos pares e ímpares
    let numeros = []
    let somaPares = 0, somaImpares = 0
    let qtdPares = 0, qtdImpares = 0

    for (let i = 0; i < 5; i++) {
      numeros[i] = parseInt(prompt(`Digite o número ${i + 1}:`))
    }

    for (let i = 0; i < 5; i++) {
      if (numeros[i] % 2 == 0) {
        somaPares += numeros[i]
        qtdPares++
      } else {
        somaImpares += numeros[i]
        qtdImpares++
      }
    }

    let mediaPares   = qtdPares   > 0 ? somaPares   / qtdPares   : 0
    let mediaImpares = qtdImpares > 0 ? somaImpares / qtdImpares : 0

    document.write("<h2>Média dos pares: " + mediaPares + "</h2><br>Média dos ímpares: " + mediaImpares)
  </script>

</body>
</html>
