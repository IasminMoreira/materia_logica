<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 18</title>
</head>
<body>

  <script>
    // Exercício 18 - Diagonal principal (onde i == j)
    let matriz = []
    let somaDiagonal = 0

    for (let i = 0; i < 3; i++) {
      matriz[i] = []
      for (let j = 0; j < 3; j++) {
        matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`))
      }
    }

    for (let i = 0; i < 3; i++) {
      somaDiagonal += matriz[i][i]
    }

    document.write("<h2>Soma da diagonal principal: " + somaDiagonal + "</h2>")
  </script>

</body>
</html>
