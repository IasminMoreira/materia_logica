<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 22</title>
</head>
<body>

  <script>
    // Exercício 22 - Multiplicação de matrizes 2x2
    let matrizA = [], matrizB = [], matrizC = []

    for (let i = 0; i < 2; i++) {
      matrizA[i] = []
      for (let j = 0; j < 2; j++) {
        matrizA[i][j] = parseInt(prompt(`Matriz A [${i}][${j}]:`))
      }
    }

    for (let i = 0; i < 2; i++) {
      matrizB[i] = []
      for (let j = 0; j < 2; j++) {
        matrizB[i][j] = parseInt(prompt(`Matriz B [${i}][${j}]:`))
      }
    }

    document.write("<h2>Produto A x B:</h2>")

    for (let i = 0; i < 2; i++) {
      matrizC[i] = []
      for (let j = 0; j < 2; j++) {
        matrizC[i][j] = 0
        for (let k = 0; k < 2; k++) {
          matrizC[i][j] += matrizA[i][k] * matrizB[k][j]
        }
        document.write(matrizC[i][j] + " ")
      }
      document.write("<br>")
    }
  </script>

</body>
</html>
